<!doctype html>
<html>
    <head>
        <title>3rd day</title>
    </head>
    <body>
        <!--unordered list-->
        <ul type="square">
            <li>orange</li>
            <li>mango</li>
            <li>apple</li>
            <li>banana</li>
        </ul>

        <!--ordered list-->
        <ol>
            <li>orange</li>
            <li>mango</li>
            <li>apple</li>
            <li>banana</li>
        </ol>
        <ol type="i">
            <li>orange</li>
            <li>mango</li>
            <li>apple</li>
            <li>banana</li>
        </ol>

        <!--superscript-->
        <p>3<sup>rd</sup>Day</p>

        <!--subscript-->
        <p>H<sub>2</sub>O</p>
        <!--discription -->
        <dl>
            <dt>apple</dt>
            <dd>it is a red fruit</dd>
            <dt>orange</dt>
            <dd>it is an orange fruit</dd>
            <dt>mango</dt>
            <dd>it is a yellow fruit</dd>
        </dl>

    </body>
</html>
