<html>
    <head>
        <title>4th day</title>
    </head>
    <body bgcolor="98F0D0">
        <marquee>default</marquee>
        <marquee behavior="slide">hello</marquee><!--move from rigth and stop at left-->
        <marquee behavior="alternate">alternate</marquee><!--rigth to left, left to right-->
        <marquee behavior="scroll">scroll</marquee><!--loop-->
        <marquee direction="left">direction left</marquee><!--starting-->
        <marquee direction="up">direction up</marquee>
        <marquee direction="down">direction down</marquee>
        <marquee scrollamount="6000">hello</marquee><!--side of movement-->
        <marquee bgcolor="orange">bgcolor</marquee>
        <marquee loop="20">loop</marquee><!--loop 20-->
        <marquee scrolldelay="6000">scrolldelay</marquee><!--speed delay-->
        <marquee widht="500">width</marquee>
        <marquee height="10" width="20" direction="down" bgcolor="yellow">heigth</marquee>
        <hr size="5">
        <hr color="red">
        <hr noshade>
        <hr width="5">
        <!--pre -->
        <pre><!--pre tag is used to display text in a fixed-width font, and it preserves both spaces and line breaks.-->
            hello                                world
                            logic
            world                                 hello
        </pre>

        <hr size="5" COLOR="BLACK">
        <!--img tag-->
        <img src="image/toy.jpeg" alt="toy" width="200px" align="center" title="toy"><!--src attribute specifies the path to the image file. title attribute provides additional information about the image-->
    </body>
</html>
