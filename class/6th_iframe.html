<html>
    <head>
        <title>6th-iframe</title>
    </head>
    <body>
        <h1>Doremon</h1>
        <iframe src="image/anywhere_door.jpeg" width="270px" height="400px"></iframe><!--iframe use to make a frame within a frame-->
	    <br>
        
        <audio controls>
            <source src="audio/doremon_title.mpeg" type="audio/mpeg"/>
        </audio>
	    <br>
        <video controls width="400px" height="300px" poster="image/anywhere_door.jpeg">
            <source src="video/doremon_title.mp4" type="video/mp4">
        </video>
            
    </body>
</html>
