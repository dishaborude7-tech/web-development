<!doctype html>
<html>
    <head>
        <title>javascript</title>
    </head>
    <body>
        <!--wajs program to calculate the sum of 3 nos.-->
        <script>
            let a=Number(prompt("Enter the first number for sum"));
            let b=Number(prompt("Enter the second number for sum"));    
            let c=Number(prompt("Enter the third number for sum"));
            document.write("the sum of three nos. is "+(a+b+c));
            </script>
        <!--wajsp to calcute the avg of 5 nos.-->
        <script>
            let x=Number(prompt("Enter the first number for average"));
            let y=Number(prompt("Enter the second number for average"));    
            let z=Number(prompt("Enter the third number for average"));
            let p=Number(prompt("Enter the fourth number for average"));
            let q=Number(prompt("Enter the fifth number for average"));
            document.write("<br>the average of five nos. is "+((x+y+z+p+q)/5));
        </script>    
        <!--take the user name and age and display it-->
        <script>
            let name=prompt("Enter your name");
            let age=Number(prompt("Enter your age"));
            document.write("<br>Name: "+name+"<br>Age: "+age);
            </script>
        <!--take the radius of circle and calculate its area-->
        <script>
            let radius=Number(prompt("Enter the radius of the circle"));
            let area=3.14*radius*radius;
            document.write("<br>The area of the circle is "+area);
        </script>
        <!--create a variable and use typeof to display its type-->
        <script>
            let myVariable = prompt("Enter a value for Variable");
            document.write("<br>The type of myVariable is: " + typeof myVariable);
        </script>

</body>
</html>
